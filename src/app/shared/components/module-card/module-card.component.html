<a
  class="module-card"
  [routerLink]="route || null"
  [attr.aria-label]="title"
>
  <div class="module-card__icon">
    <ion-icon [name]="icon" aria-hidden="true"></ion-icon>
  </div>

  <div class="module-card__copy">
    <p class="module-card__eyebrow">Modulo</p>
    <h3>{{ title }}</h3>
    <p class="module-card__description">{{ description }}</p>
  </div>

  <div class="module-card__arrow" aria-hidden="true">
    <ion-icon name="arrow-forward-outline"></ion-icon>
  </div>
</a>
