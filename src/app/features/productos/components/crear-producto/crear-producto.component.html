<ion-header class="form-header">
  <ion-toolbar class="form-toolbar">
    <ion-buttons slot="start"><ion-button class="back-button" (click)="volverAGestion()"><ion-icon name="arrow-back-outline"></ion-icon></ion-button></ion-buttons>
    <ion-title>Nuevo Producto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="form-shell ion-padding">
    <section class="hero-section"><p class="hero-eyebrow">PRODUCTOS</p><h1>Nuevo producto</h1><p class="hero-copy">Registra un producto con una presentacion mas clara y consistente con el panel principal.</p></section>
    <ion-card class="form-card"><ion-card-content>
      <div class="section-heading"><div class="section-icon" aria-hidden="true"><ion-icon name="basket-outline"></ion-icon></div><div class="section-copy"><p class="section-label">FORMULARIO</p><h2 class="form-title">Informacion del producto</h2><p>Completa nombre, descripcion, stock, precio y cultivo antes de guardar.</p></div></div>
      <div class="fields-grid">
        <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="basket-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input placeholder="Nombre del producto" [(ngModel)]="producto.nombre"></ion-input></ion-item></div>
        <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="leaf-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input placeholder="Descripcion" [(ngModel)]="producto.descripcion"></ion-input></ion-item></div>
        <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="cube-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input type="number" placeholder="Stock" [(ngModel)]="producto.cantidadStock"></ion-input></ion-item></div>
        <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="cash-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input type="number" step="0.01" placeholder="Precio por caja" [(ngModel)]="producto.precioCaja"></ion-input></ion-item></div>
        <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="leaf-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-select placeholder="Seleccionar cultivo" [(ngModel)]="producto.idCultivo"><ion-select-option *ngFor="let cultivo of cultivos" [value]="cultivo.id">{{ cultivo.nombre }}</ion-select-option></ion-select></ion-item></div>
      </div>
    </ion-card-content></ion-card>
    <ion-button expand="block" class="btn-guardar" [disabled]="guardando || cargandoDatos || !formularioValido()" (click)="guardar()"><ion-icon name="checkmark-outline" slot="start"></ion-icon>Registrar producto</ion-button>
  </div>
</ion-content>
