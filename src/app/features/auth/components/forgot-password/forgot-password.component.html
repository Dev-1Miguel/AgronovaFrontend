<ion-content class="login-content">
  <div class="login-shell">
    <section class="login-hero">
      <p class="login-eyebrow">AGRONOVA</p>
      <ion-title>Recuperar contrasena</ion-title>
      <p class="login-copy">Te enviaremos un enlace para restablecer tu contrasena si la cuenta existe.</p>
    </section>

    <ion-card class="login-card">
      <ion-card-content>
        <div class="field-group">
          <ion-label class="field-label">Correo</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="email"
              placeholder="correo@agronova.com"
              [(ngModel)]="correo"
              [disabled]="loading">
            </ion-input>
          </ion-item>
        </div>

        @if (errorMessage) {
          <ion-text color="danger" class="error-text">{{ errorMessage }}</ion-text>
        }

        @if (successMessage) {
          <ion-text color="success" class="success-text">{{ successMessage }}</ion-text>
        }

        <ion-button
          expand="block"
          class="login-button"
          [disabled]="loading"
          (click)="enviarEnlace()">
          @if (loading) {
            <ion-spinner name="crescent" slot="start"></ion-spinner>
          }
          Enviar enlace
        </ion-button>

        <div class="secondary-actions">
          <a class="auth-link" routerLink="/login">Volver a iniciar sesion</a>
          <a class="auth-link" routerLink="/auth/register">Crear cuenta</a>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
