<ion-content class="login-content">
  <div class="login-shell">
    <section class="login-hero">
      <p class="login-eyebrow">AGRONOVA</p>
      <ion-title>Crear cuenta</ion-title>
      <p class="login-copy">Registra tus datos para acceder a los modulos operativos.</p>
    </section>

    <ion-card class="login-card">
      <ion-card-content>
        <div class="field-group">
          <ion-label class="field-label">Nombre</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              placeholder="Tu nombre"
              [(ngModel)]="nombre"
              [disabled]="loading">
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <ion-label class="field-label">Correo</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="email"
              placeholder="correo@agronova.com"
              [(ngModel)]="correo"
              [disabled]="loading">
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <ion-label class="field-label">Contrasena</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="password"
              placeholder="Minimo 8 caracteres"
              [(ngModel)]="contrasena"
              [disabled]="loading">
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <ion-label class="field-label">Confirmar contrasena</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="password"
              placeholder="Repite tu contrasena"
              [(ngModel)]="confirmarContrasena"
              [disabled]="loading">
            </ion-input>
          </ion-item>
        </div>

        @if (errorMessage) {
          <ion-text color="danger" class="error-text">{{ errorMessage }}</ion-text>
        }

        <ion-button
          expand="block"
          class="login-button"
          [disabled]="loading"
          (click)="registrar()">
          @if (loading) {
            <ion-spinner name="crescent" slot="start"></ion-spinner>
          }
          Crear cuenta
        </ion-button>

        <div class="secondary-actions">
          <a class="auth-link" routerLink="/login">Volver a iniciar sesion</a>
          <a class="auth-link" routerLink="/auth/forgot-password">Olvide mi contrasena</a>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
