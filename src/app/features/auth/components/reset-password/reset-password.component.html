<ion-content class="login-content">
  <div class="login-shell">
    <section class="login-hero">
      <p class="login-eyebrow">AGRONOVA</p>
      <ion-title>Nueva contrasena</ion-title>
      <p class="login-copy">Ingresa una nueva contrasena para completar la recuperacion.</p>
    </section>

    <ion-card class="login-card">
      <ion-card-content>
        <div class="field-group">
          <ion-label class="field-label">Nueva contrasena</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="password"
              placeholder="Minimo 8 caracteres"
              [(ngModel)]="contrasena"
              [disabled]="loading || !token">
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <ion-label class="field-label">Confirmar contrasena</ion-label>
          <ion-item class="field-item" lines="none">
            <ion-input
              type="password"
              placeholder="Repite tu contrasena"
              [(ngModel)]="confirmarContrasena"
              [disabled]="loading || !token">
            </ion-input>
          </ion-item>
        </div>

        @if (errorMessage) {
          <ion-text color="danger" class="error-text">{{ errorMessage }}</ion-text>
        }

        <ion-button
          expand="block"
          class="login-button"
          [disabled]="loading || !token"
          (click)="restablecerContrasena()">
          @if (loading) {
            <ion-spinner name="crescent" slot="start"></ion-spinner>
          }
          Guardar contrasena
        </ion-button>

        <div class="secondary-actions">
          <a class="auth-link" routerLink="/login">Volver a iniciar sesion</a>
          <a class="auth-link" routerLink="/auth/forgot-password">Solicitar otro enlace</a>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
