<ion-header class="form-header">
  <ion-toolbar class="form-toolbar">
    <ion-buttons slot="start"><ion-button class="back-button" (click)="volverAGestion()"><ion-icon name="arrow-back-outline"></ion-icon></ion-button></ion-buttons>
    <ion-title>Editar Insumo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="form-shell ion-padding">
    <section class="hero-section">
      <p class="hero-eyebrow">INSUMOS</p>
      <h1>Editar insumo</h1>
      <p class="hero-copy">Actualiza descripcion, tipo, cantidad y unidad de medida sin alterar el flujo actual.</p>
    </section>

    <ion-card class="form-card">
      <ion-card-content>
        <div class="section-heading">
          <div class="section-icon" aria-hidden="true"><ion-icon name="archive-outline"></ion-icon></div>
          <div class="section-copy">
            <p class="section-label">FORMULARIO</p>
            <h2 class="form-title">Informacion del insumo</h2>
            <p>Revisa y ajusta los datos del insumo antes de guardar los cambios.</p>
          </div>
        </div>

        <div class="fields-grid">
          <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="archive-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input placeholder="Descripcion del insumo" [(ngModel)]="insumo.descripcion"></ion-input></ion-item></div>
          <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="pricetag-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-select placeholder="Seleccionar tipo de insumo" [(ngModel)]="insumo.idTipoInsumo"><ion-select-option *ngFor="let tipo of tiposInsumo" [value]="tipo.id">{{ tipo.nombre }}</ion-select-option></ion-select></ion-item></div>
          <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="cube-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-input type="number" placeholder="Cantidad" [(ngModel)]="insumo.cantidad"></ion-input></ion-item></div>
          <div class="field-shell"><div class="field-icon" aria-hidden="true"><ion-icon name="albums-outline"></ion-icon></div><ion-item class="form-item" lines="none"><ion-select placeholder="Unidad de medida" [(ngModel)]="insumo.unidadMedida"><ion-select-option *ngFor="let unidad of unidadesMedida" [value]="unidad">{{ unidad }}</ion-select-option></ion-select></ion-item></div>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" class="btn-guardar" [disabled]="guardando || cargando || !formularioValido()" (click)="guardar()"><ion-icon name="checkmark-outline" slot="start"></ion-icon>Actualizar insumo</ion-button>
  </div>
</ion-content>
