<ion-header>
  <ion-toolbar color="success">
    <ion-buttons slot="start">
      <ion-button (click)="volverAGestion()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Nuevo Insumo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content ion-padding">
  <ion-card class="form-card">
    <ion-card-content>
      <h2 class="form-title">Información del insumo</h2>

      <ion-item class="form-item" lines="none">
        <ion-icon name="archive-outline" slot="start"></ion-icon>
        <ion-input
          placeholder="Descripción del insumo"
          [(ngModel)]="insumo.descripcion">
        </ion-input>
      </ion-item>

      <ion-item class="form-item" lines="none">
        <ion-icon name="pricetag-outline" slot="start"></ion-icon>
        <ion-select
          placeholder="Seleccionar tipo de insumo"
          [(ngModel)]="insumo.idTipoInsumo">
          <ion-select-option
            *ngFor="let tipo of tiposInsumo"
            [value]="tipo.id">
            {{ tipo.nombre }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="form-item" lines="none">
        <ion-icon name="archive-outline" slot="start"></ion-icon>
        <ion-input
          type="number"
          placeholder="Cantidad"
          [(ngModel)]="insumo.cantidad">
        </ion-input>
      </ion-item>

      <ion-item class="form-item" lines="none">
        <ion-icon name="archive-outline" slot="start"></ion-icon>
        <ion-select
          placeholder="Unidad de medida"
          [(ngModel)]="insumo.unidadMedida">
          <ion-select-option
            *ngFor="let unidad of unidadesMedida"
            [value]="unidad">
            {{ unidad }}
          </ion-select-option>
        </ion-select>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <ion-button
    expand="block"
    class="btn-guardar"
    [disabled]="guardando || cargandoDatos || !formularioValido()"
    (click)="guardar()">
    <ion-icon name="checkmark-outline" slot="start"></ion-icon>
    Registrar insumo
  </ion-button>
</ion-content>
