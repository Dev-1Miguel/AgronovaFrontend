<ion-header>
  <ion-toolbar color="success">
    <ion-title>Gestion de Tareas</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="abrirFormulario()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Nueva
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="tareas-content ion-padding">
  <div class="vista-selector">
    <button
      type="button"
      class="vista-button"
      [class.is-active]="vistaActual === 'lista'"
      (click)="cambiarVista('lista')">
      Lista
    </button>

    <button
      type="button"
      class="vista-button"
      [class.is-active]="vistaActual === 'gantt'"
      (click)="cambiarVista('gantt')">
      Gantt
    </button>
  </div>

  <ion-searchbar
    *ngIf="vistaActual === 'lista'"
    placeholder="Buscar tarea"
    [(ngModel)]="busqueda">
  </ion-searchbar>

  <ng-container *ngIf="vistaActual === 'lista'; else ganttView">
    <ion-card
      class="tarea-card"
      *ngFor="let tarea of tareasFiltradas()">

      <ion-card-content>
        <div class="tarea-row">
          <div class="icon-box">
            <ion-icon name="reader-outline"></ion-icon>
          </div>

          <div class="tarea-info">
            <h2>{{ tarea.nombre }}</h2>
            <p>{{ obtenerTipoTarea(tarea) }}</p>
            <p>{{ obtenerCultivo(tarea) }}</p>
            <p>{{ tarea.fechaInicio }} - {{ tarea.fechaFin }}</p>
            <p>{{ obtenerAgricultores(tarea) }}</p>
            <p>{{ obtenerResumenInsumos(tarea) }}</p>
            <p class="estado">{{ tarea.estado || 'Activo' }}</p>
          </div>

          <ion-buttons>
            <ion-button
              color="success"
              *ngIf="puedeCompletar(tarea)"
              (click)="completarTarea(tarea)">
              <ion-icon name="checkmark-done-outline"></ion-icon>
            </ion-button>

            <ion-button color="primary" (click)="editarTarea(tarea)">
              <ion-icon name="create-outline"></ion-icon>
            </ion-button>

            <ion-button color="danger" (click)="eliminarTarea(tarea)">
              <ion-icon name="trash-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </div>
      </ion-card-content>
    </ion-card>
  </ng-container>

  <ng-template #ganttView>
    <app-tareas-gantt [tareas]="tareas"></app-tareas-gantt>
  </ng-template>
</ion-content>
